name: Update sponsors

on:
  schedule:
    - cron: "0 5 * * *"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}

jobs:
  sponsors:
    name: Update sponsors in README
    runs-on: ubuntu-latest
    if: github.repository_owner == '0xERR0R'
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v7

      # Sponsors are matched on the monthly amount in cents, NOT on the tier
      # name configured in GitHub Sponsors. If a tier is renamed or repriced
      # there, the thresholds below must be updated to match, otherwise
      # sponsors are silently sorted into the wrong section.
      #
      # Both bounds are inclusive: gold is >= $25.00, sponsors is <= $24.99.
      - name: Generate gold sponsors
        id: gold
        uses: JamesIves/github-sponsors-readme-action@v1
        with:
          token: ${{ secrets.SPONSORS_TOKEN }}
          file: README.md
          marker: gold
          minimum: 2500
          template: '<a href="https://github.com/{{ login }}"><img src="{{ avatarUrl }}" width="60px" alt="Gold sponsor: {{ login }}" /></a>'
          fallback: '<em><a href="https://github.com/sponsors/0xERR0R">Become a gold sponsor</a> to appear here.</em>'

      - name: Generate sponsors
        id: sponsors
        uses: JamesIves/github-sponsors-readme-action@v1
        with:
          token: ${{ secrets.SPONSORS_TOKEN }}
          file: README.md
          marker: sponsors
          maximum: 2499
          template: '<a href="https://github.com/{{ login }}"><img src="{{ avatarUrl }}" width="60px" alt="Sponsor: {{ login }}" /></a>'
          fallback: '<em><a href="https://github.com/sponsors/0xERR0R">Become a sponsor</a> to appear here.</em>'

      # The action reports `skipped` rather than failing when it cannot find
      # its markers in README.md, which would leave this job green while
      # silently writing nothing at all. Fail loudly instead, so that a README
      # edit dropping a marker cannot quietly disable this workflow forever.
      - name: Verify both sponsor sections were written
        run: |
          for section in gold sponsors; do
            case "$section" in
              gold) status="${{ steps.gold.outputs.sponsorshipStatus }}" ;;
              sponsors) status="${{ steps.sponsors.outputs.sponsorshipStatus }}" ;;
            esac
            if [ "$status" != "success" ]; then
              echo "::error::'$section' returned '$status' instead of 'success' — are the <!-- $section --> markers still present in README.md?"
              exit 1
            fi
          done
          echo "Both sponsor sections were written."

      # SPONSORS_TOKEN is used here as well, on purpose: pull requests opened
      # with the default GITHUB_TOKEN do not trigger workflows, so the status
      # checks required by the branch protection on `main` would never run and
      # the pull request could never be merged.
      - name: Create pull request
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.SPONSORS_TOKEN }}
          branch: chore/update-sponsors
          delete-branch: true
          commit-message: "docs: update sponsors in README"
          title: "docs: update sponsors in README"
          body: |
            Automated update of the sponsor lists in `README.md`.

            Generated by the [`Update sponsors`](.github/workflows/sponsors.yml) workflow.
          labels: 📘 documentation
